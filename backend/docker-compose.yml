services:
  postgres:
    image: postgres:16-alpine
    container_name: baxti-pos-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: baxti_pos
    ports:
      - "5432:5432"
    volumes:
      - baxti_pos_pgdata:/var/lib/postgresql/data

volumes:
  baxti_pos_pgdata:
